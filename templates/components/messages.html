<!-- templates/components/messages.html -->
<!-- Componente reutilizable para mostrar mensajes de Django (success, error, info, warning). -->
<!-- Se incluye desde base.html para que esté disponible en todas las páginas. -->

{% if messages %}
<div class="px-8 pt-4 space-y-2" id="django-messages">
    {% for message in messages %}
    <div class="flex items-start gap-3 px-4 py-3 rounded-lg border text-sm font-medium
        {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
        {% elif message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
        {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
        {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}"
        role="alert">
        <span>
            {% if message.tags == 'success' %}<i data-lucide="check-circle" class="w-5 h-5 text-emerald-600"></i>
            {% elif message.tags == 'error' %}<i data-lucide="x-circle" class="w-5 h-5 text-red-600"></i>
            {% elif message.tags == 'warning' %}<i data-lucide="alert-triangle" class="w-5 h-5 text-amber-600"></i>
            {% else %}<i data-lucide="info" class="w-5 h-5 text-blue-600"></i>{% endif %}
        </span>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
